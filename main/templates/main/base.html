<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TPRM System{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'css/loading.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'css/lstyle.css' %}">
  <link rel="stylesheet" href="{% static 'pooja/css/pooja.css' %}">


  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="{% static 'js/auth_utils.js' %}" defer></script>
  <script src="{% static 'js/loading.js' %}" defer></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <!-- GSAP Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <!-- Lenis Smooth Scroll -->
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>


  {% block extra_css %}{% endblock %}
</head>

<body>

  <div id="loading-screen">
    <div class="loader"></div>
  </div>
  <!-- navbar  -->
  {% include 'includes/navbar.html' %}
  <!-- body  -->

  {% if messages %}
  <div id="django-messages"
    class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 space-y-3 w-full max-w-md text-center pointer-events-none">

    {% for message in messages %}
    <div class="msg px-4 py-3 rounded-xl shadow-lg text-white inline-block pointer-events-auto
      {% if message.tags == 'success' %} bg-green-600
      {% elif message.tags == 'error' %} bg-red-600
      {% else %} bg-gray-700
      {% endif %}">
      {{ message }}
    </div>
    {% endfor %}

  </div>

  <style>
    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(16px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg {
      animation: fadeSlideUp 0.45s ease-out;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* hide animation class applied before removing */
    .msg--hide {
      opacity: 0 !important;
      transform: translateY(-8px) !important;
    }
  </style>

  <script>
    (function () {
      const container = document.getElementById('django-messages');
      if (!container) return;

      // Auto-hide after 3s (but play hide transition first)
      const VISIBLE_MS = 3000;
      const HIDE_ANIM_MS = 400;

      setTimeout(() => {
        container.querySelectorAll('.msg').forEach(el => {
          el.classList.add('msg--hide');
        });

        // remove nodes after hide animation completes
        setTimeout(() => {
          container.remove();
        }, HIDE_ANIM_MS);
      }, VISIBLE_MS);

      // Optional: pause auto-hide while mouse is over the container
      let hideTimeout = null;
      container.addEventListener('mouseenter', () => {
        // cancel scheduled hide
        // (we can't cancel the outer setTimeout easily here, so we just clear and re-schedule)
        // simpler approach: when mouse enters, remove hide class and postpone removal
        container.querySelectorAll('.msg').forEach(el => el.classList.remove('msg--hide'));
      });
      container.addEventListener('mouseleave', () => {
        // restart hide timer
        setTimeout(() => {
          container.querySelectorAll('.msg').forEach(el => el.classList.add('msg--hide'));
          setTimeout(() => { container.remove(); }, HIDE_ANIM_MS);
        }, 1200);
      });
    })();
  </script>
  {% endif %}



  {% block content %}
  {% endblock %}
  <!-- footer  -->
  {% include 'includes/footer.html' %}


  {% block extra_js %}{% endblock %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="{% static 'js/lscript.js' %}"></script>
  <script src="{% static 'pooja/js/pooja.js' defer %}"></script>
  <!-- <script src="{% static 'django_browser_reload/reload.js' %}"></script> -->
  <!-- <script src="{% static 'bookibg/js/admin_report.js' %}"></script> -->

  <!-- Toast Notification System -->
  <script>
    // Toast notification system
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `fixed left-1/2 -translate-x-1/2 top-4 px-6 py-3 rounded-lg text-white font-medium shadow-lg z-50 transform transition-all duration-300 ease-in-out ${type === 'success' ? 'bg-green-600' :
          pe === 'error' ? 'bg-red-600' :
            type === 'warning' ? 'bg-yellow-600' : 'bg-blue-600'
        }`;
      toast.style.opacity = '0';
      toast.style.transform = 'translate(-50%, -100%)';
      toast.textContent = message;
      document.body.appendChild(toast);

      // Trigger the slide-down animation
      setTimeout(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translate(-50%, 0)';
      }, 10);

      // Auto remove after 5 seconds
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, -100%)';
        setTimeout(() => toast.remove(), 300);
      }, 5000);
    }

    // Make showToast available globally
    window.showToast = showToast;

    // Listen for show-toast events
    window.addEventListener('show-toast', (e) => {
      if (e.detail && e.detail.message) {
        showToast(e.detail.message, e.detail.type || 'info');
      }
    });
  </script>
  <script src="{% static 'js/animations.js' %}"></script>
</body>

</html>
