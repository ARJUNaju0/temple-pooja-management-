{% extends "main/base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100 pt-20">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-4">
      Reset Your Password
    </h2>

    <div id="errorBox" class="hidden bg-red-100 text-red-700 p-3 rounded mb-3"></div>
    <div id="successBox" class="hidden bg-green-100 text-green-700 p-3 rounded mb-3"></div>

    <form id="resetForm">
      {% csrf_token %}

      <input type="hidden" id="token" value="{{ token }}">

      <div class="mb-4">
        <label class="block mb-1 font-semibold">New Password</label>
        <input type="password" id="password1" class="w-full border p-2 rounded" required>
      </div>
      <div class="mt-2">
        <div class="flex justify-between text-xs mb-1">
            <span id="strengthText" class="font-semibold text-gray-600">
            Password strength
            </span>
        </div>

        <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="strengthBar"
                class="h-2 rounded-full transition-all duration-300 w-0 bg-red-500">
            </div>
        </div>
        </div>


      <div class="mb-4">
        <label class="block mb-1 font-semibold">Confirm Password</label>
        <input type="password" id="password2" class="w-full border p-2 rounded" required>
      </div>

      <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded">
        Reset Password
      </button>
    </form>

  </div>
</div>

<script>
document.getElementById("resetForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const password1 = document.getElementById("password1").value;
  const password2 = document.getElementById("password2").value;
  const token = document.getElementById("token").value;
  const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;

  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  errorBox.classList.add("hidden");
  successBox.classList.add("hidden");

  if (password1 !== password2) {
    errorBox.textContent = "Passwords do not match";
    errorBox.classList.remove("hidden");
    return;
  }

  const response = await fetch("/api/password/reset/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": csrf
    },
    body: JSON.stringify({
      token: token,
      password: password1
    })
  });

  const data = await response.json();

  if (response.ok) {
    successBox.textContent = "Password reset successful. Redirecting to login...";
    successBox.classList.remove("hidden");

    setTimeout(() => {
      window.location.href = "/login/";
    }, 2000);
  } else {
    errorBox.textContent = data.error || "Something went wrong";
    errorBox.classList.remove("hidden");
  }
});
const passwordInput = document.getElementById("password1");
const strengthBar = document.getElementById("strengthBar");
const strengthText = document.getElementById("strengthText");

passwordInput.addEventListener("input", () => {
  const pwd = passwordInput.value;
  let score = 0;

  if (pwd.length >= 8) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;

  const levels = [
    { text: "Very Weak", color: "bg-red-500", width: "20%" },
    { text: "Weak", color: "bg-orange-500", width: "40%" },
    { text: "Fair", color: "bg-yellow-500", width: "60%" },
    { text: "Good", color: "bg-blue-500", width: "80%" },
    { text: "Strong", color: "bg-green-600", width: "100%" }
  ];

  if (pwd.length === 0) {
    strengthBar.style.width = "0%";
    strengthBar.className = "h-2 rounded-full transition-all duration-300";
    strengthText.textContent = "Password strength";
    return;
  }

  const level = levels[score - 1];
  strengthBar.style.width = level.width;
  strengthBar.className = `h-2 rounded-full transition-all duration-300 ${level.color}`;
  strengthText.textContent = level.text;
});
</script>
{% endblock %}
