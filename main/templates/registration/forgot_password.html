{% extends "main/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50 flex items-center justify-center pt-20 pb-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-amber-300">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="mx-auto w-16 h-16 rounded-full bg-gradient-to-br from-orange-500 to-yellow-600 flex items-center justify-center text-white text-2xl font-bold shadow-md">
        🔒
      </div>
      <h2 class="text-2xl font-bold text-amber-900 mt-4">
        Forgot Password
      </h2>
      <p class="text-sm text-amber-700 mt-2">
        Enter your registered email and we’ll send you a reset link.
      </p>
    </div>

    <!-- Alert -->
    <div id="infoBox" class="hidden bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-lg mb-4">
      If the email exists, a reset link has been sent.
    </div>

    <!-- Form -->
    <form id="forgotForm" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-amber-900 mb-1">
          Email Address
        </label>
        <input
          type="email"
          id="email"
          required
          placeholder="Enter your email"
          class="w-full p-3 border border-amber-300 bg-amber-50 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-transparent"
        />
      </div>

      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-3 rounded-xl shadow-md transition duration-300 ease-in-out disabled:opacity-60 disabled:cursor-not-allowed"
        >
        Send Reset Link
        </button>

    </form>

    <!-- Footer -->
    <div class="text-center mt-6">
      <a href="/login/" class="text-sm text-amber-700 hover:text-amber-900 font-semibold">
        ← Back to Login
      </a>
    </div>

  </div>
</section>

<script>
const form = document.getElementById("forgotForm");
const btn = document.getElementById("submitBtn");
const emailInput = document.getElementById("email");
const infoBox = document.getElementById("infoBox");
const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;

const COOLDOWN = 60; // seconds
const storageKey = "forgot_password_cooldown";

function startCooldown(seconds) {
  let remaining = seconds;
  btn.disabled = true;

  const interval = setInterval(() => {
    btn.textContent = `Resend in ${remaining}s`;
    remaining--;

    if (remaining < 0) {
      clearInterval(interval);
      btn.disabled = false;
      btn.textContent = "Send Reset Link";
      localStorage.removeItem(storageKey);
    }
  }, 1000);
}

const savedCooldown = localStorage.getItem(storageKey);
if (savedCooldown) {
  const diff = Math.floor((savedCooldown - Date.now()) / 1000);
  if (diff > 0) startCooldown(diff);
}

form.addEventListener("submit", async e => {
  e.preventDefault();

  btn.disabled = true;
  btn.textContent = "Sending...";

  await fetch("/api/password/forgot/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": csrf
    },
    body: JSON.stringify({ email: emailInput.value })
  });

  infoBox.classList.remove("hidden");

  const expiry = Date.now() + COOLDOWN * 1000;
  localStorage.setItem(storageKey, expiry);

  startCooldown(COOLDOWN);
});
</script>
{% endblock %}
