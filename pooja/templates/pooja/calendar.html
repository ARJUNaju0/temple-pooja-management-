{% extends "main/base.html" %}
{% load static %}
{% block content %}

<style>
/* Tooltip Base */
.calendar-tooltip {
    position: fixed;
    width: 320px;
    max-width: calc(100vw - 32px);
    background: #ffffff;
    color: #111827;
    padding: 0.9rem;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(2,6,23,0.12);
    border: 1px solid #e6edf3;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    z-index: 999999;
    transition: opacity 0.18s ease, transform 0.12s ease;
    visibility: hidden;
}

/* visible */
.calendar-tooltip.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

/* scroll area inside tooltip */
.calendar-tooltip-content {
    max-height: 260px;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 6px;
}

/* custom scrollbar (webkit) */
.calendar-tooltip-content::-webkit-scrollbar { width: 7px; }
.calendar-tooltip-content::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 8px; }
.calendar-tooltip-content::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }
.calendar-tooltip-content::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* Firefox scrollbar */
.calendar-tooltip-content { scrollbar-width: thin; scrollbar-color: #d1d5db #f3f4f6; }

.date-cell { cursor: pointer; user-select: none; }
.date-cell .date-inner { transition: background-color 0.12s ease; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; padding:6px; box-sizing:border-box; }
.date-cell:hover .date-inner { background: rgba(243,244,246,0.8); }

/* pooja item */
.pooja-item { 
    padding:0.6rem; 
    background:#fbfdff; 
    border-radius:8px; 
    margin-bottom:0.5rem; 
    border:1px solid #eef2f7; 
    transition: all 0.2s ease;
}
.pooja-item:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-color: #c7d2fe;
}
.pooja-item .pooja-name { font-weight:600; color:#0f172a; margin-bottom:4px; font-size:13px; }
.pooja-item .pooja-meta { font-size:12px; color:#475569; line-height:1.2; }

/* small helper */
.ml-date { font-weight:700; }
.en-date { font-size:11px; color:#475569; }

/* nakshatra */
.nak { font-size:10px; color:#2563eb; font-weight:700; position:absolute; bottom:6px; right:6px; }

/* Responsive Design - Tablet (768px - 1023px) */
@media (max-width: 1023px) {
  .calendar-tooltip { width: 280px; }
  .date-cell { height: 80px !important; }
  .ml-date { font-size: 16px !important; }
  .en-date { font-size: 10px !important; }
  .nak { font-size: 9px !important; }
}

/* Responsive Design - Mobile (Below 768px) */
@media (max-width: 767px) {
  .pt-24 { padding-top: 4rem !important; }
  .pb-10 { padding-bottom: 2rem !important; }
  
  .max-w-6xl { padding: 0.75rem !important; }
  .rounded-2xl { border-radius: 1rem !important; }
  
  /* Header adjustments */
  .flex-wrap { flex-direction: column; align-items: stretch !important; }
  .gap-3 { gap: 0.75rem !important; }
  
  /* Month label */
  h2#cal-month-label { font-size: 1.25rem !important; }
  .text-sm { font-size: 0.75rem !important; }
  
  /* Filter and controls */
  #pooja-type-filter { width: 100%; font-size: 0.875rem; padding: 0.5rem; }
  
  /* Mode toggle */
  .inline-flex.items-center { width: 100%; justify-content: center; }
  
  /* Navigation buttons */
  .flex.items-center.gap-2 { width: 100%; justify-content: space-between; }
  .flex.items-center.gap-2 button { flex: 1; font-size: 0.75rem; padding: 0.5rem 0.25rem; }
  
  /* Weekday headers */
  .grid.grid-cols-7.text-xs { font-size: 0.65rem !important; }
  
  /* Calendar cells */
  .date-cell { 
    height: 70px !important; 
    min-height: 70px !important;
  }
  
  .date-inner { padding: 4px !important; }
  
  /* Date numbers */
  .ml-date { font-size: 14px !important; }
  .en-date { font-size: 9px !important; }
  .nak { 
    font-size: 7px !important; 
    bottom: 2px !important;
    right: 2px !important;
  }
  
  /* Tooltip on mobile */
  .calendar-tooltip { 
    width: calc(100vw - 24px) !important;
    max-width: 280px;
    font-size: 12px;
    padding: 0.75rem;
  }
  
  .calendar-tooltip-content { max-height: 200px; }
  
  .pooja-item { 
    padding: 0.5rem; 
    margin-bottom: 0.4rem;
  }
  
  .pooja-name { font-size: 12px !important; }
  .pooja-meta { font-size: 11px !important; }
}

/* Extra Small Mobile (Below 400px) */
@media (max-width: 399px) {
  .date-cell { height: 60px !important; min-height: 60px !important; }
  .ml-date { font-size: 12px !important; }
  .en-date { font-size: 8px !important; }
  .nak { display: none; } /* Hide nakshatra on very small screens */
  
  h2#cal-month-label { font-size: 1.1rem !important; }
  
  .flex.items-center.gap-2 button { 
    font-size: 0.7rem; 
    padding: 0.4rem 0.15rem;
  }
}

/* Landscape mobile orientation */
@media (max-width: 767px) and (orientation: landscape) {
  .pt-24 { padding-top: 2rem !important; }
  .pb-10 { padding-bottom: 1rem !important; }
  .date-cell { height: 65px !important; }
}

/* Touch device improvements */
@media (hover: none) and (pointer: coarse) {
  .date-cell { 
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0.1);
  }
  
  .date-cell:active .date-inner { 
    background: rgba(243,244,246,0.9) !important;
    transform: scale(0.98);
  }
  
  button:active {
    transform: scale(0.95);
  }
}
</style>

<div class="pt-24 pb-10 bg-gradient-to-br from-indigo-50 via-purple-50 to-white min-h-screen">
  <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl p-6">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
      <div>
        <h2 id="cal-month-label" class="text-2xl font-semibold text-gray-800"></h2>
        <p class="text-sm text-gray-500">Malayalam + Gregorian Calendar</p>
      </div>

      <div class="flex items-center gap-3 flex-wrap">
        <!-- Pooja Type Filter -->
        <div class="relative">
          <select id="pooja-type-filter" class="px-3 py-1.5 rounded-lg border text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-500 appearance-none pr-8">
            <option value="all">All Poojas</option>
            <!-- Options will be populated dynamically -->
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
              <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
            </svg>
          </div>
        </div>

        <!-- Mode Toggle -->
        <div class="inline-flex items-center bg-gray-100 rounded-full p-1 text-xs">
          <button id="mode-ml" class="px-3 py-1 rounded-full font-medium bg-white shadow-sm text-purple-700">മ-Mal</button>
          <button id="mode-en" class="px-3 py-1 rounded-full font-medium text-gray-600">EN-Eng</button>
        </div>

        <!-- Navigation -->
        <div class="flex items-center gap-2">
          <button id="cal-prev" class="px-3 py-1.5 rounded-lg border text-sm">‹ Prev</button>
          <button id="cal-today" class="px-3 py-1.5 rounded-lg border text-sm">Today</button>
          <button id="cal-next" class="px-3 py-1.5 rounded-lg border text-sm">Next ›</button>
        </div>
      </div>
    </div>

    <!-- Weekdays -->
    <div class="grid grid-cols-7 text-xs font-semibold text-gray-500 border-b pb-2 mb-1">
      <div class="text-center">Sun</div><div class="text-center">Mon</div><div class="text-center">Tue</div>
      <div class="text-center">Wed</div><div class="text-center">Thu</div><div class="text-center">Fri</div>
      <div class="text-center">Sat</div>
    </div>

    <!-- Calendar grid -->
    <div id="cal-grid" class="space-y-1"></div>

  </div>
</div>

<!-- Shared Tooltip -->
<div id="shared-tooltip" class="calendar-tooltip" role="dialog" aria-hidden="true">
  <div id="tooltip-content" class="calendar-tooltip-content"></div>
</div>

<script>
console.log("📌 Calendar Script Loaded");

document.addEventListener("DOMContentLoaded", () => {
    console.log("📌 DOM Ready");

    const monthLabelEl = document.getElementById("cal-month-label");
    const gridEl = document.getElementById("cal-grid");
    const modeMlBtn = document.getElementById("mode-ml");
    const modeEnBtn = document.getElementById("mode-en");
    const sharedTooltip = document.getElementById("shared-tooltip");
    const tooltipContent = document.getElementById("tooltip-content");
    const poojaTypeFilter = document.getElementById("pooja-type-filter");

    const calState = { current: new Date(), mode: "ml", selectedPoojaType: "all" };

    let currentHoverCell = null;
    let tooltipTimeout = null;
    let isTooltipHovered = false;
    let allPoojaTypes = new Set();

    function fmtDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    async function getML(year, month) {
        console.log("🔵 Fetch ML:", year, month);
        const res = await fetch(`/api/calendar/${year}/${month}/`);
        if (!res.ok) throw new Error('ML API failed: ' + res.status);
        const data = await res.json();
        console.log("🟢 ML API:", data);
        const map = {};
        (data.days || []).forEach(d => map[d.day] = d);
        return map;
    }

    async function getPoojaEvents() {
        console.log("🔵 Fetching Pooja Events...");
        const res = await fetch("/api/pooja-calendar-events/");
        if (!res.ok) throw new Error('Events API failed: ' + res.status);
        const data = await res.json();
        console.log("🟢 Pooja Events:", data);
        
        // Extract all unique pooja types for the filter
        const events = data.events || {};
        Object.values(events).forEach(dayEvents => {
            dayEvents.forEach(event => {
                if (event.name) {
                    allPoojaTypes.add(event.name);
                }
            });
        });
        
        return events;
    }

    function populatePoojaTypeFilter() {
        // Clear existing options except "All Poojas"
        poojaTypeFilter.innerHTML = '<option value="all">All Poojas</option>';
        
        // Add options for each unique pooja type
        const sortedTypes = Array.from(allPoojaTypes).sort();
        sortedTypes.forEach(type => {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = type;
            poojaTypeFilter.appendChild(option);
        });
        
        // Restore selected value if exists
        if (calState.selectedPoojaType) {
            poojaTypeFilter.value = calState.selectedPoojaType;
        }
    }

    function filterEventsByType(events) {
        if (calState.selectedPoojaType === "all") {
            return events;
        }
        return events.filter(event => event.name === calState.selectedPoojaType);
    }

    function updateModeButtons() {
        if (calState.mode === "ml") {
            modeMlBtn.className = "px-3 py-1 rounded-full font-medium bg-white shadow-sm text-purple-700";
            modeEnBtn.className = "px-3 py-1 rounded-full font-medium text-gray-600";
        } else {
            modeEnBtn.className = "px-3 py-1 rounded-full font-medium bg-white shadow-sm text-indigo-700";
            modeMlBtn.className = "px-3 py-1 rounded-full font-medium text-gray-600";
        }
    }

    function showTooltip(cell, dateStr, events, rowIndex, colIndex) {
        // avoid redundant
        if (currentHoverCell === cell) return;
        currentHoverCell = cell;
        clearTimeout(tooltipTimeout);

        console.log("🟡 showTooltip", dateStr, "events:", events.length);

        // Helper function to convert color to light shade
        function getLightColor(color) {
            const colorMap = {
                'red': '#fee2e2',
                'green': '#d1fae5',
                'blue': '#dbeafe',
                'yellow': '#fef3c7',
                'purple': '#e9d5ff',
                'pink': '#fce7f3',
                'orange': '#fed7aa',
                'indigo': '#e0e7ff',
                'teal': '#ccfbf1',
                'cyan': '#cffafe',
                'lime': '#ecfccb',
                'amber': '#fde68a',
                'rose': '#ffe4e6',
                'violet': '#ede9fe',
                'fuchsia': '#fae8ff',
                'sky': '#e0f2fe',
                'emerald': '#d1fae5',
                'slate': '#f1f5f9',
                'gray': '#f3f4f6',
                'neutral': '#f5f5f5'
            };
            return colorMap[color.toLowerCase()] || '#fbfdff';
        }

        // build content line by line
        const header = `<div style="font-weight:700; margin-bottom:8px; border-bottom:1px solid #eef2f7; padding-bottom:6px; color:#0f172a;">${dateStr}</div>`;
        const body = (events.length ? events.map(e => {
            console.log('Event data:', e); // Debug log
            const bgColor = getLightColor(e.color || 'gray');
            const bookingUrl = `/pooja/${e.id}/book/`;
            console.log('Booking URL:', bookingUrl); // Debug log
            return `<div class="pooja-item" style="background:${bgColor}; cursor:pointer;" data-pooja-id="${e.id}">
                        <div class="pooja-name" style="color:#000000;">${e.name} <span style="font-size:11px; color:#3b82f6;">(Book Now)</span></div>
                        <div class="pooja-meta" style="color:#000000;">
                            Type: ${e.type || 'normal'}<br>
                            Slots: ${e.available_slots}/${e.max_slots} · Amount: ₹${e.amount}
                        </div>
                    </div>`;
        }).join('') : `<div style="padding:10px; text-align:center; color:#6b7280">No poojas</div>`);

        tooltipContent.innerHTML = header + body;
        
        // Add event listeners after content is added to DOM
        document.querySelectorAll('.pooja-item').forEach(item => {
            item.addEventListener('click', function() {
                const poojaId = this.getAttribute('data-pooja-id');
                console.log('Clicked pooja ID:', poojaId);
                window.location.href = `/pooja/${poojaId}/book/`;
            });
        });

        // ensure layout done before measuring
        sharedTooltip.classList.add('show');

        // position:
        const rect = cell.getBoundingClientRect();
        const tooltipRect = sharedTooltip.getBoundingClientRect();

        // Decide vertical direction:
        // if rowIndex is 0,1,2 -> show below the cell (so tooltip doesn't cover top row)
        // else -> show above the cell
        const showBelow = rowIndex <= 2;

        let top;
        if (showBelow) {
            top = rect.bottom + 8; // below cell
        } else {
            top = rect.top - tooltipRect.height - 8; // above cell
        }

        // If tooltip runs off top, push inside
        if (top < 8) top = rect.bottom + 8;

        // horizontal: prefer right of cell but clamp to viewport
        let left = rect.left + (rect.width/2) - (tooltipRect.width/2);
        const minLeft = 8;
        const maxLeft = window.innerWidth - tooltipRect.width - 8;
        if (left < minLeft) left = minLeft;
        if (left > maxLeft) left = maxLeft;

        sharedTooltip.style.left = `${left}px`;
        sharedTooltip.style.top = `${top}px`;
        sharedTooltip.style.transform = 'translateY(0)';

        // accessibility
        sharedTooltip.setAttribute('aria-hidden', 'false');
    }

    function hideTooltip() {
        clearTimeout(tooltipTimeout);
        tooltipTimeout = setTimeout(() => {
            if (!isTooltipHovered) {
                sharedTooltip.classList.remove('show');
                currentHoverCell = null;
                sharedTooltip.setAttribute('aria-hidden', 'true');
            }
        }, 120);
    }

    // Keep tooltip open when hovered
    sharedTooltip.addEventListener("mouseenter", () => {
        isTooltipHovered = true;
        clearTimeout(tooltipTimeout);
    });
    sharedTooltip.addEventListener("mouseleave", () => {
        isTooltipHovered = false;
        hideTooltip();
    });

    // Close tooltip when clicking outside on mobile
    document.addEventListener('click', function(e) {
        if (window.innerWidth <= 767) {
            if (!e.target.closest('.date-cell') && !e.target.closest('#shared-tooltip')) {
                sharedTooltip.classList.remove('show');
                currentHoverCell = null;
                sharedTooltip.setAttribute('aria-hidden', 'true');
            }
        }
    });

    async function renderCalendar() {
        console.log("📌 Rendering Calendar...");

        const year = calState.current.getFullYear();
        const monthIdx = calState.current.getMonth();
        const monthName = calState.current.toLocaleString("en-US", { month: "long" });

        let mlMap = {};
        let eventMap = {};
        try {
            mlMap = await getML(year, monthIdx + 1);
        } catch (err) {
            console.error("ML fetch error:", err);
        }
        try {
            eventMap = await getPoojaEvents();
            populatePoojaTypeFilter(); // Populate filter dropdown after fetching events
        } catch (err) {
            console.error("Events fetch error:", err);
        }

        monthLabelEl.textContent = `${monthName} ${year}`;

        const firstOfMonth = new Date(year, monthIdx, 1);
        const firstWeekday = firstOfMonth.getDay();
        const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

        // create rows container (we render rows of 7)
        gridEl.innerHTML = "";
        sharedTooltip.classList.remove('show');

        // build 6 potential rows (0..5), each row is a div.grid
        let cellIndex = 0;
        for (let row = 0; row < 6; row++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid grid-cols-7 gap-px w-full';
            rowDiv.dataset.rowIndex = row;
            gridEl.appendChild(rowDiv);

            let rowEmptyCount = 0;

            for (let col = 0; col < 7; col++) {
                const i = (row * 7) + col;
                const dayNum = i - firstWeekday + 1;

                const cell = document.createElement("div");
                cell.className = "h-24 bg-white border border-gray-100 relative date-cell";
                cell.style.minHeight = "96px"; // Ensure consistent height

                const inner = document.createElement("div");
                inner.className = "date-inner";

                if (dayNum >= 1 && dayNum <= daysInMonth) {
                    const dateObj = new Date(year, monthIdx, dayNum);
                    // ⭐ Highlight today's date
                    const today = new Date();
                    if (
                        dayNum === today.getDate() &&
                        monthIdx === today.getMonth() &&
                        year === today.getFullYear()
                    ) {
                        cell.style.color = "indigo";      
                    }

                    const dateStr = fmtDate(dateObj);
                    const mlInfo = mlMap[dayNum] || {};
                    const allEventsForDay = eventMap[dateStr] || [];
                    const eventsForDay = filterEventsByType(allEventsForDay);

                    // color rules - based on filtered events
                    if (eventsForDay.length === 0) {
                        cell.classList.add("bg-red-100","border-red-200");
                    } else {
                        cell.classList.add("bg-green-100","border-green-200");
                    }

                    // english small (corner) + malayalam big center or vice versa
                    const engSpan = document.createElement('span');
                    
                    engSpan.className = 'en-date';
                    engSpan.textContent = dayNum;

                    const mlSpan = document.createElement('span');
                    
                    mlSpan.className = 'ml-date';
                    mlSpan.textContent = mlInfo.ml_day ?? "";
                    if (
                        dayNum === today.getDate() &&
                        monthIdx === today.getMonth() &&
                        year === today.getFullYear()
                    ) {
                        engSpan.style.color = "indigo";
                    }

                    
                    if (calState.mode === 'ml') {
                        mlSpan.classList.add('text-xl');
                        engSpan.style.position = 'absolute';
                        engSpan.style.top = '6px';
                        engSpan.style.right = '8px';
                        engSpan.style.background = 'transparent';
                        engSpan.style.padding = '2px 6px';
                        engSpan.style.borderRadius = '6px';
                    } else {
                        engSpan.classList.add('text-xl');
                        engSpan.style.fontWeight = '700';
                        engSpan.style.fontSize = '28px'
                        mlSpan.style.position = 'absolute';
                        mlSpan.style.bottom = '6px';
                        mlSpan.style.left = '8px';
                        mlSpan.style.fontSize = '11px';
                    }

                    inner.appendChild(mlSpan);
                    inner.appendChild(engSpan);
                    
                    // nakshatra small
                    const nak = document.createElement('div');
                    nak.className = 'nak';
                    nak.textContent = mlInfo.ml_naksatra || "";
                    inner.appendChild(nak);

                    // store dataset for tooltip and click
                    cell.dataset.dateStr = dateStr;
                    cell.dataset.rowIndex = row;
                    cell.dataset.colIndex = col;
                    cell.dataset.events = JSON.stringify(eventsForDay);
                    cell.dataset.empty = "0";

                    // hover -> tooltip (desktop only)
                    cell.addEventListener('mouseenter', function(ev){
                        if (window.innerWidth > 767) { // Only show tooltip on desktop/tablet
                            const events = JSON.parse(this.dataset.events || "[]");
                            showTooltip(this, this.dataset.dateStr, events, Number(this.dataset.rowIndex), Number(this.dataset.colIndex));
                        }
                    });
                    cell.addEventListener('mouseleave', hideTooltip);

                    // click -> booking or show tooltip on mobile
                    cell.addEventListener('click', function(ev){
                        if (window.innerWidth <= 767) {
                            // On mobile: first click shows tooltip, second click goes to booking
                            if (currentHoverCell === this && sharedTooltip.classList.contains('show')) {
                                // Get the first pooja ID from the events data
                                const events = JSON.parse(this.dataset.events || "[]");
                                if (events.length > 0) {
                                    window.location.href = `/pooja/${events[0].id}/book/`;
                                }
                            } else {
                                const events = JSON.parse(this.dataset.events || "[]");
                                showTooltip(this, this.dataset.dateStr, events, Number(this.dataset.rowIndex), Number(this.dataset.colIndex));
                            }
                        } else {
                            // On desktop: direct booking
                            window.location.href = `/book-pooja/?date=${this.dataset.dateStr}`;
                        }
                    });

                } else {
                    // empty outside-month cell
                    cell.classList.add("bg-yellow-100","border-yellow-200");
                    cell.dataset.empty = "1";
                    rowEmptyCount++;
                }

                cell.appendChild(inner);
                rowDiv.appendChild(cell);
                cellIndex++;
            }

            // hide row if fully empty
            if (rowEmptyCount === 7) {
                rowDiv.style.display = 'none';
            }
        } // end rows loop

        console.log("📌 Render complete, rows:", gridEl.children.length);
    }

    /* Navigation handlers */
    document.getElementById("cal-prev").addEventListener("click", () => {
        calState.current.setMonth(calState.current.getMonth() - 1);
        renderCalendar();
    });
    document.getElementById("cal-next").addEventListener("click", () => {
        calState.current.setMonth(calState.current.getMonth() + 1);
        renderCalendar();
    });
    document.getElementById("cal-today").addEventListener("click", () => {
        calState.current = new Date();
        renderCalendar();
    });

    /* mode toggle */
    modeMlBtn.addEventListener("click", () => {
        calState.mode = "ml";
        updateModeButtons();
        renderCalendar();
    });
    modeEnBtn.addEventListener("click", () => {
        calState.mode = "en";
        updateModeButtons();
        renderCalendar();
    });

    /* Pooja type filter handler */
    poojaTypeFilter.addEventListener("change", (e) => {
        calState.selectedPoojaType = e.target.value;
        console.log("🔵 Filter changed to:", calState.selectedPoojaType);
        renderCalendar();
    });

    updateModeButtons();
    renderCalendar();
});
</script>

{% endblock %}
