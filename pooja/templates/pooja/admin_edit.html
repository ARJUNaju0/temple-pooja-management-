{% extends 'main/base.html' %}
{% load static %}
{% block content %}

<div class="pt-16">
<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden mt-10">

    <!-- Header -->
    <div class="bg-orange-400 p-6 text-center">
        <h1 class="text-2xl font-bold text-white">Edit Pooja</h1>
    </div>

    <div class="p-8">

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}bg-red-100 text-red-700 border-l-4 border-red-600{% else %}bg-green-100 text-green-700 border-l-4 border-green-600{% endif %} px-4 py-3 rounded mb-5">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- GRID -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Name -->
                <div>
                    <label class="font-semibold block mb-2">Pooja Name *</label>
                    <input 
                        type="text"
                        name="name"
                        value="{{ pooja.name }}"
                        required
                        class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 transition"
                    >
                </div>

                <!-- Amount -->
                <div>
                    <label class="font-semibold block mb-2">Amount (₹) *</label>
                    <input 
                        type="number"
                        name="amount"
                        min="0"
                        step="0.01"
                        value="{{ pooja.amount }}"
                        required
                        class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 transition"
                    >
                </div>

                <!-- Date -->
                <div>
                    <label class="font-semibold block mb-2">Pooja Date (Optional)</label>
                    <input 
                        type="date"
                        name="pooja_date"
                        value="{{ pooja.pooja_date|date:'Y-m-d' }}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 transition"
                    >
                </div>

                <!-- Max Slots -->
                <div>
                    <label class="font-semibold block mb-2">Maximum Slots *</label>
                    <input 
                        type="number"
                        name="max_slots"
                        min="1"
                        value="{{ pooja.max_slots }}"
                        required
                        class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 transition"
                    >
                </div>

                <!-- Available Slots -->
                <div>
                    <label class="font-semibold block mb-2">Available Slots *</label>
                    <input 
                        type="number"
                        name="available_slots"
                        min="0"
                        value="{{ pooja.available_slots }}"
                        required
                        class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 transition"
                    >
                </div>

                <!-- Special -->
                <div class="flex items-center gap-2 mt-6">
                    <input
                        type="checkbox"
                        name="is_special"
                        {% if pooja.is_special_pooja %}checked{% endif %}
                        class="w-5 h-5 text-indigo-600 border-gray-300 rounded"
                    >
                    <label class="text-gray-700 font-medium">Mark as Special Pooja</label>
                </div>

                <!-- Multiple Bookings Toggle -->
                <div class="flex items-center gap-2 mt-6">
                    <input
                        type="checkbox"
                        name="allow_multiple_bookings"
                        id="multiple-bookings-toggle"
                        {% if pooja.allow_multiple_bookings %}checked{% endif %}
                        class="w-5 h-5 text-indigo-600 border-gray-300 rounded"
                    >
                    <label for="multiple-bookings-toggle" class="text-gray-700 font-medium">Allow Multiple Bookings</label>
                </div>

            </div>

            <!-- Description -->
            <div class="mt-6">
                <label class="font-semibold block mb-2">Description</label>
                <textarea 
                    name="description"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 transition resize-y min-h-[120px]"
                >{{ pooja.description }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-4 mt-10">
                <a href="/manage/" 
                   class="bg-gray-500 hover:bg-gray-600 text-white px-5 py-2 rounded-lg shadow transition">
                    Cancel
                </a>

                <button type="submit"
                    class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2 rounded-lg shadow transition">
                    Update Pooja
                </button>
            </div>

        </form>
    </div>

</div>
</div>

{% endblock %}
