{% extends 'main/base.html' %}
{% block title %} Member Pooja Services {% endblock %}

{% block extra_css %}
<style>
.calendar-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: #d97706;
    color: white;
    border: none;
    border-radius: 0.375rem;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    text-decoration: none;
    transition: background-color 0.2s;
}

.calendar-link:hover {
    background: #b45309;
}

.calendar-link i {
    font-size: 1rem;
}

.action-buttons {
    display: flex;
    gap: 0.5rem;
}
</style>
{% endblock %}

{% block content %}

<div class="min-h-screen relative bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50 pt-16 pb-12">
    

    <div class="section-header text-center mb-4">

        
        <h2 style="font-family: 'Georgia', serif; color: #a84b06; font-size: 2rem;">
            Available Poojas
        </h2>
        <p style="color: #8a3f04; font-weight: 500;">Choose a pooja that suits your needs</p>
    </div>
    

    <div class="container mx-auto px-4">

<!-- SEARCH BAR -->
        <div class="search-bar-container">
            <div class="search-form-wrapper">
                
                <div class="input-group">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchName" placeholder="Search">
                </div>

                <div class="divider"></div>

                <div class="input-group">
                    <i class="fas fa-calendar-alt search-icon"></i>
                    <input type="date" id="searchDate" title="Filter by Date">
                </div>

                <div class="divider"></div>

                <div class="input-group">
                    <i class="fas fa-filter search-icon"></i>
                    <select id="searchCategory">
                        <option value="">All types</option>
                        <option value="special">Special</option>
                        <option value="regular">Regular</option>
                    </select>
                </div>

                <div class="action-buttons flex gap-2">
                    <a href="{% url 'pooja:calendar' %}" class="calendar-link" style="border-radius: 40px; overflow: hidden;">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Calendar View</span>
                    </a>
                    <button onclick="fetchPoojas()" class="btn-search">Search</button>
                    <button onclick="clearFilters()" class="btn-clear">Clear</button>
                </div>

            </div>
        </div>
        
        <!-- LOADER -->
        <div id="loadingSpinner" class="text-center py-5 d-none">
            <div class="spinner-border text-warning" role="status"></div>
        </div>

        <!-- LIST -->
        <div id="poojaList" class="pooja-cards-container"></div>

        <!-- NO RESULTS -->
        <div id="noResults" class="text-center py-5" style="display: none;">
            <div class="no-results-box">
                <i class="fas fa-om fa-3x mb-3" style="color: #d97706;"></i>
                <h4 style="color: #b45309;">No Poojas Found</h4>
                <p style="color: #92400e;">Try adjusting your filters.</p>
                <button onclick="clearFilters()" class="btn btn-link text-warning">Show all</button>
            </div>
        </div>

    </div>
</div>

<style>
/* ===== SEARCH BAR ===== */
.search-bar-container {
    width: fit-content;
    margin: auto;
    margin-bottom: 2rem;
}
.search-form-wrapper {
    background: white;
    border-radius: 50px;
    padding: 8px 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    border: 1px solid #ffd49c;
    display: flex;
    align-items: center;
    gap: 10px;
}

.input-group {
    display: flex;
    align-items: center;
    gap: 6px;
}

.search-icon {
    color: #c47c1a;
}

.input-group input, .input-group select {
    border: none;
    outline: none;
    background: transparent;
    font-size: 0.9rem;
    color: #4b5563;
    font-weight: 500;
    width: 140px;
}

.divider {
    width: 1px;
    height: 20px;
    background-color: #e5e7eb;
}

.btn-search {
    background: linear-gradient(135deg, #d97706, #b45309);
    color: white;
    border: none;
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-search:hover {
    transform: translateY(-2px);
}

.btn-clear {
    background: white;
    border: 1px solid #d6d3d1;
    color: #6b7280;
    border-radius: 30px;
    padding: 5px 12px;
    cursor: pointer;
}

/* ===== CARD GRID ===== */
.pooja-cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
}

/* ===== POOJA CARD ===== */
.pooja-card {
    background: #fff9e9;
    border-radius: 20px;
    padding: 20px;
    border: 2px solid #f0c97a;
    position: relative;
    transition: 0.35s ease;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* GOLDEN GLOW EFFECT */
.pooja-card:hover {
    transform: translateY(-6px);
    border-color: #ffcf4d;
    box-shadow: 0 0 12px rgba(255, 187, 0, 0.5),
                0 0 25px rgba(255, 170, 0, 0.3),
                0 0 40px rgba(255, 145, 0, 0.2);
}

/* CONTENT */
.pooja-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #8a3f04;
}
.pooja-description {
    color: #6b7280;
}
.pooja-amount {
    color: #b45309;
    font-size: 1.2rem;
    font-weight: bold;
}

/* DATE BADGE */
.date-badge {
    position: absolute;
    top: -15px;
    right: -15px;
    background: #b45309;
    color: white;
    border-radius: 12px;
    text-align: center;
    padding: 6px;
    width: 60px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width: 900px){
    .search-form-wrapper {
        flex-direction: column;
        border-radius: 20px;
        padding: 20px;
        gap: 15px;
        align-items: stretch;
    }
    .divider { display: none; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("searchDate").setAttribute('min', today);
    fetchPoojas();
});

async function fetchPoojas() {
    const name = document.getElementById('searchName').value;
    const date = document.getElementById('searchDate').value;
    const category = document.getElementById('searchCategory').value;

    const list = document.getElementById('poojaList');
    const spinner = document.getElementById('loadingSpinner');
    const noResults = document.getElementById('noResults');

    spinner.classList.remove('d-none');
    list.classList.add('d-none');
    noResults.style.display = 'none';

    try {
        const baseUrl = "{% url 'pooja:api_pooja_list' %}";
        const params = new URLSearchParams();

        if(name) params.append('name', name);
        if(date) params.append('date', date);
        if(category) params.append('category', category);

        const response = await fetch(`${baseUrl}?${params}`);
        const data = await response.json();
        const poojas = data.poojas || [];

        list.innerHTML = "";

        if(poojas.length === 0){
            noResults.style.display = 'block';
        } else {
            list.classList.remove('d-none');
            poojas.forEach(p => list.innerHTML += createPoojaCard(p));
        }

    } catch(err){
        list.innerHTML = "<p class='text-danger text-center'>Error loading poojas.</p>";
    }

    spinner.classList.add('d-none');
}

function createPoojaCard(p){
    return `
    <div class="pooja-card">
        <div class="d-flex justify-content-between">
            <span class="pooja-title">${p.name}</span>
            ${p.is_special_pooja ? `<span class="badge bg-warning text-dark">SPECIAL</span>` : ""}
        </div>

        <p class="pooja-description mt-2">${p.description || "No description available."}</p>

        <p class="mt-2">
            <i class="fas fa-users text-warning"></i>
            <strong>${p.available_slots}</strong> / ${p.max_slots} slots
        </p>

        <div class="mt-3 d-flex justify-content-between align-items-center">
    <span class="pooja-amount" style="font-weight:700; font-size:1.1rem;">₹${p.amount}</span>
    
       <a href="javascript:void(0)"
            onclick="bookPooja(${p.id})"
            class="btn btn-sm text-white shadow-sm"
            style="background: linear-gradient(to right, #ebb756ff, #d97706); 
                border: none; border-radius: 50px; padding: 8px 20px; font-weight: 600;">
            Book Now
            <i class="fas fa-arrow-right ms-1"></i>
        </a>


    </div>

        ${p.pooja_date ? createDateBadge(p.pooja_date) : ""}
    </div>`;
}

function createDateBadge(date){
    const d = new Date(date);
    return `
    <div class="date-badge">
        <div>${d.toLocaleString('default', { month: 'short' }).toUpperCase()}</div>
        <div>${d.getDate()}</div>
        <div style="font-size:10px;">${d.getFullYear()}</div>
    </div>`;
}

function clearFilters(){
    document.getElementById('searchName').value = "";
    document.getElementById('searchDate').value = "";
    document.getElementById('searchCategory').value = "";
    fetchPoojas();
}

function bookPooja(id){
    window.location.href = `/pooja/${id}/book/`;
}


// CSRF helper
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

</script>

{% endblock %}
